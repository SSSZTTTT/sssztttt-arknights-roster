<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星6オペレーター 極限育成ロースター</title>
  <style>
    /* アークナイツ風のダークテーマ・スタイリング */
    body {
      background-color: #1e1e1e;
      color: #e0e0e0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #111;
      padding: 15px 20px;
      text-align: center;
      border-bottom: 2px solid #00a8ff;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }
    /* タブのスタイル */
    .tabs {
      display: flex;
      overflow-x: auto;
      background-color: #2a2a2a;
      padding: 10px;
      gap: 10px;
      white-space: nowrap;
    }
    .tab-btn {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .tab-btn.active {
      background-color: #00a8ff;
      color: #000;
    }
    /* オペレーターカードのグリッド */
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
    }
    .card {
      background-color: #2d2d2d;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 15px;
      position: relative;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .op-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
      border-bottom: 1px solid #555;
      padding-bottom: 5px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    .highlight {
      color: #ffd700; /* 金色（特化3や完凸などの強調） */
      font-weight: bold;
    }
    .loading {
      text-align: center;
      padding: 50px;
      font-size: 1.2rem;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>★6 育成ロースター</h1>
  </header>

  <div class="tabs" id="tabContainer">
    </div>

  <div id="loading" class="loading">スプレッドシートからデータを取得中...</div>

  <div class="container" id="cardContainer">
    </div>

  <script>
    // ★★★ここに先ほどコピーしたGASのWebアプリURLを貼り付けます★★★
    const GAS_URL = "https://script.google.com/macros/s/AKfycby6tdhjMeqZm6YZGDwEd5hZJX4wtTec_rH5OsGD5zqKXxlpL9itGtBFIYzUcTDRxkVU/exec";

    let opData = {};

    // データの取得
    async function fetchData() {
      try {
        const response = await fetch(GAS_URL);
        opData = await response.json();
        document.getElementById("loading").style.display = "none";
        
        createTabs();
        // 初期表示は「先鋒」
        renderCards("先鋒");
      } catch (error) {
        document.getElementById("loading").innerText = "データの取得に失敗しました。URLを確認してください。";
        console.error(error);
      }
    }

    // タブの生成
    function createTabs() {
      const tabContainer = document.getElementById("tabContainer");
      // 集計シート以外をタブにする
      const classes = ["先鋒", "前衛", "重装", "狙撃", "術師", "医療", "補助", "特殊"];
      
      classes.forEach(cls => {
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (cls === "先鋒" ? " active" : "");
        btn.innerText = cls;
        btn.onclick = () => {
          // アクティブタブの切り替え
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          renderCards(cls);
        };
        tabContainer.appendChild(btn);
      });
    }

    // カードの描画
    function renderCards(className) {
      const container = document.getElementById("cardContainer");
      container.innerHTML = ""; // 一旦クリア

      const ops = opData[className];
      if (!ops) return;

      ops.forEach(op => {
        // スキル情報のフォーマット（特化3なら金色に）
        const s1 = op["S1"] == 3 ? `<span class="highlight">M3</span>` : op["S1"];
        const s2 = op["S2"] == 3 ? `<span class="highlight">M3</span>` : op["S2"];
        const s3 = op["S3"] == 3 ? `<span class="highlight">M3</span>` : op["S3"];
        
        // 潜在のフォーマット（6以上なら金色に）
        const pot = op["潜在"] >= 6 ? `<span class="highlight">完凸 (${op["潜在"]})</span>` : op["潜在"];

        // モジュールの抽出（X, Y, Δ, α で値があるものだけ表示）
        let mods = [];
        if (op["X"] && op["X"] !== "-") mods.push(`X${op["X"]}`);
        if (op["Y"] && op["Y"] !== "-") mods.push(`Y${op["Y"]}`);
        if (op["Δ"] && op["Δ"] !== "-") mods.push(`Δ${op["Δ"]}`);
        if (op["α"] && op["α"] !== "-") mods.push(`α${op["α"]}`);
        const modText = mods.length > 0 ? `<span class="highlight">${mods.join(" / ")}</span>` : "-";

        const cardHTML = `
          <div class="card">
            <div class="op-name">${op["オペレーター名"]}</div>
            <div class="stat-row"><span>Lv:</span> <span class="highlight">${op["Lv"]}</span></div>
            <div class="stat-row"><span>潜在:</span> <span>${pot}</span></div>
            <div class="stat-row"><span>スキル:</span> <span>S1:${s1} S2:${s2} S3:${s3}</span></div>
            <div class="stat-row"><span>モジュール:</span> <span>${modText}</span></div>
          </div>
        `;
        container.innerHTML += cardHTML;
      });
    }

    // 起動時にデータを取得
    window.onload = fetchData;
  </script>
</body>
</html>
