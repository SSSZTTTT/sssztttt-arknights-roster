<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星6オペレーター 極限育成ロースター</title>
  <style>
    /* ダークテーマ・スタイリング */
    body {
      background-color: #1e1e1e;
      color: #e0e0e0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #111;
      padding: 15px 20px;
      text-align: center;
      border-bottom: 2px solid #00a8ff;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }
    /* タブのスタイル */
    .tabs {
      display: flex;
      overflow-x: auto;
      background-color: #2a2a2a;
      padding: 10px;
      gap: 10px;
      white-space: nowrap;
    }
    .tab-btn {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 10px 16px; /* スマホで押しやすいように少し高く */
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .tab-btn.active {
      background-color: #00a8ff;
      color: #000;
    }
    /* ★変更点: スマホでは縦並び(横長)、PCでは適度なグリッドになるように調整 */
    .container {
      padding: 15px;
      display: grid;
      /* 最小幅を300pxに広げることで、スマホでは自動的に1列(横長)になります */
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }
    .card {
      background-color: #2d2d2d;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 15px;
      position: relative;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .op-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
      border-bottom: 1px solid #555;
      padding-bottom: 5px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem; /* 少し文字を大きく */
      margin-bottom: 8px;
    }
    .highlight {
      color: #ffd700;
      font-weight: bold;
    }
    /* スキル表示用の専用コンテナ */
    .skills-container {
      display: flex;
      justify-content: space-around;
      background-color: #1a1a1a;
      border-radius: 4px;
      padding: 8px 0;
      margin-top: 12px;
      border: 1px solid #333;
    }
    .skill-item {
      text-align: center;
      font-size: 1rem;
    }
    .skill-label {
      font-size: 0.7rem;
      color: #888;
      display: block;
      margin-bottom: 2px;
    }
    /* 集計カード（全職合計）の特別装飾 */
    .total-card {
      border: 1px solid #00a8ff;
      box-shadow: 0 0 12px rgba(0,168,255,0.2);
    }
    .loading {
      text-align: center;
      padding: 50px;
      font-size: 1.2rem;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>★6 育成ロースター</h1>
  </header>

  <div class="tabs" id="tabContainer">
    </div>

  <div id="loading" class="loading">データを取得中...</div>

  <div class="container" id="cardContainer">
    </div>

  <script>
    // ★★★ここにGASのURLを貼り付けてください★★★
    const GAS_URL = "https://script.google.com/macros/s/AKfycby6tdhjMeqZm6YZGDwEd5hZJX4wtTec_rH5OsGD5zqKXxlpL9itGtBFIYzUcTDRxkVU/exec";

    let opData = {};

    // データの取得
    async function fetchData() {
      try {
        const response = await fetch(GAS_URL);
        opData = await response.json();
        document.getElementById("loading").style.display = "none";
        
        createTabs();
        // 初期表示を「集計」にする
        renderSummary();
      } catch (error) {
        document.getElementById("loading").innerText = "データの取得に失敗しました。";
        console.error(error);
      }
    }

    // タブの生成
    function createTabs() {
      const tabContainer = document.getElementById("tabContainer");
      const classes = ["集計", "先鋒", "前衛", "重装", "狙撃", "術師", "医療", "補助", "特殊"];
      
      classes.forEach(cls => {
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (cls === "集計" ? " active" : "");
        btn.innerText = cls;
        btn.onclick = () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          
          if (cls === "集計") {
            renderSummary();
          } else {
            renderCards(cls);
          }
        };
        tabContainer.appendChild(btn);
      });
    }

    // 「集計」タブの描画
    function renderSummary() {
      const container = document.getElementById("cardContainer");
      container.innerHTML = ""; 

      const ops = opData["集計"];
      if (!ops) return;

      ops.forEach(row => {
        const formatPercent = (val) => {
          if (typeof val === 'number') return (val * 100).toFixed(1) + '%';
          return val;
        };

        const tRate = formatPercent(row["特化3率"]);
        const pRate = formatPercent(row["完凸率"]);
        
        const isTotal = row["職"] === "全職合計";
        const cardClass = isTotal ? "card total-card" : "card";
        const nameStyle = isTotal ? "color: #00a8ff;" : "";

        // ★変更点: 「所属人数」を「人数」に、金色の強調(<span class="highlight">)を削除しました
        const cardHTML = `
          <div class="${cardClass}">
            <div class="op-name" style="${nameStyle}">${row["職"]}</div>
            <div class="stat-row"><span>人数:</span> <span>${row["人数"]} 名</span></div>
            <div class="stat-row"><span>全特化完了:</span> <span>${row["全特化人数"]} 名</span></div>
            <div class="stat-row"><span>特化3 達成率:</span> <span class="highlight">${tRate}</span></div>
            <div class="stat-row"><span>完凸人数:</span> <span>${row["完凸人数"]} 名</span></div>
            <div class="stat-row"><span>完凸 達成率:</span> <span>${pRate}</span></div>
            <div class="stat-row"><span>潜在合計:</span> <span>${row["潜在合計"]}</span></div>
          </div>
        `;
        container.innerHTML += cardHTML;
      });
    }

    // 各職分のカード描画
    function renderCards(className) {
      const container = document.getElementById("cardContainer");
      container.innerHTML = ""; 

      const ops = opData[className];
      if (!ops) return;

      ops.forEach(op => {
        const s1 = op["S1"] == 3 ? `<span class="highlight">M3</span>` : (op["S1"] || "-");
        const s2 = op["S2"] == 3 ? `<span class="highlight">M3</span>` : (op["S2"] || "-");
        const s3 = op["S3"] == 3 ? `<span class="highlight">M3</span>` : (op["S3"] || "-");
        
        const pot = op["潜在"] >= 6 ? `<span class="highlight">完凸 (${op["潜在"]})</span>` : op["潜在"];

        let mods = [];
        if (op["X"] && op["X"] !== "-") mods.push(`X${op["X"]}`);
        if (op["Y"] && op["Y"] !== "-") mods.push(`Y${op["Y"]}`);
        if (op["Δ"] && op["Δ"] !== "-") mods.push(`Δ${op["Δ"]}`);
        if (op["α"] && op["α"] !== "-") mods.push(`α${op["α"]}`);
        const modText = mods.length > 0 ? `<span class="highlight">${mods.join(" / ")}</span>` : "-";

        const cardHTML = `
          <div class="card">
            <div class="op-name">${op["オペレーター名"]}</div>
            <div class="stat-row"><span>Lv:</span> <span class="highlight">${op["Lv"]}</span></div>
            <div class="stat-row"><span>潜在:</span> <span>${pot}</span></div>
            <div class="stat-row"><span>モジュール:</span> <span>${modText}</span></div>
            
            <div class="skills-container">
              <div class="skill-item"><span class="skill-label">S1</span>${s1}</div>
              <div class="skill-item"><span class="skill-label">S2</span>${s2}</div>
              <div class="skill-item"><span class="skill-label">S3</span>${s3}</div>
            </div>
            
          </div>
        `;
        container.innerHTML += cardHTML;
      });
    }

    // 起動時にデータを取得
    window.onload = fetchData;
  </script>
</body>
</html>
